spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/devforge?options=-c%20TimeZone=Asia/Kolkata
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  spring:
    jpa:
      open-in-view: false