services:

  postgres:
    image: postgres:16
    container_name: devforge-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: devforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: devforge-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devforge.ai
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: devforge-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    container_name: devforge-ollama

    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: